<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Untitled Crab Game</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #120d07;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
        font-family: "Trebuchet MS", sans-serif;
      }

      #game {
        width: 100%;
        height: 100%;
      }

      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
